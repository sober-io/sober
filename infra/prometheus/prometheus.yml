global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/curated/*.yml
  - /etc/prometheus/alerts/generated/*.yml

scrape_configs:
  - job_name: sober-api
    static_configs:
      - targets: ['sober-api:3000']
  - job_name: sober-agent
    static_configs:
      - targets: ['sober-agent:9100']
  - job_name: sober-scheduler
    static_configs:
      - targets: ['sober-scheduler:9101']
