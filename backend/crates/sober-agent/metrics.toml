# sober-agent metrics
#
# All metrics are recorded via the `metrics` crate (0.24) facade macros.
# A recorder (e.g. metrics-exporter-prometheus) must be installed at startup
# for these to be collected.

[group.agent_loop]
name = "Agent Loop"
description = "Metrics for the top-level agent request handling and LLM reasoning loop."

[[group.agent_loop.metrics]]
name = "sober_agent_requests_total"
type = "counter"
description = "Total number of agent requests handled."
labels = ["trigger", "status"]
# trigger: human, scheduler, replica, admin
# status: success, error

[[group.agent_loop.metrics]]
name = "sober_agent_request_duration_seconds"
type = "histogram"
description = "Wall-clock duration of a full agent request (from spawn to completion)."
labels = ["trigger"]
# trigger: human, scheduler, replica, admin

[[group.agent_loop.metrics]]
name = "sober_agent_loop_iterations_total"
type = "counter"
description = "Total number of agentic loop iterations across all requests."
labels = []

[[group.agent_loop.metrics]]
name = "sober_agent_loop_iterations_per_request"
type = "histogram"
description = "Number of loop iterations consumed by a single request."
labels = []

[group.tool_execution]
name = "Tool Execution"
description = "Metrics for individual tool call execution within the agent loop."

[[group.tool_execution.metrics]]
name = "sober_agent_tool_calls_total"
type = "counter"
description = "Total number of tool calls executed."
labels = ["tool", "status"]
# tool: tool name (e.g. shell, web_search, recall)
# status: success, error, not_found

[[group.tool_execution.metrics]]
name = "sober_agent_tool_call_duration_seconds"
type = "histogram"
description = "Duration of individual tool call execution."
labels = ["tool"]
# tool: tool name

[group.evolution]
name = "Evolution"
description = "Self-evolution loop metrics: proposals, execution, reverts."

[[group.evolution.metrics]]
name = "sober_evolution_events_total"
type = "counter"
description = "Evolution events by type and status."
labels = ["type", "status"]
# type: plugin, skill, instruction, automation
# status: active, failed

[[group.evolution.metrics]]
name = "sober_evolution_execution_duration_seconds"
type = "histogram"
description = "Evolution execution latency by type."
labels = ["type"]
# type: plugin, skill, instruction, automation

[[group.evolution.metrics]]
name = "sober_evolution_cycle_duration_seconds"
type = "histogram"
description = "Full self-evolution check cycle duration."
labels = []

[[group.evolution.metrics]]
name = "sober_evolution_proposals_total"
type = "counter"
description = "Proposals created by type and autonomy outcome."
labels = ["type", "autonomy"]
# type: plugin, skill, instruction, automation
# autonomy: auto_approved, proposed, duplicate

[[group.evolution.metrics]]
name = "sober_evolution_reverts_total"
type = "counter"
description = "Evolution reverts by type."
labels = ["type"]
# type: plugin, skill, instruction, automation

