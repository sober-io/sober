[crate]
name = "sober-sandbox"
dashboard_title = "Sandbox"

[[metrics]]
name = "sober_sandbox_executions_total"
type = "counter"
help = "Sandbox execution count"
labels = ["profile", "status"]
group = "Execution"

[[metrics]]
name = "sober_sandbox_execution_duration_seconds"
type = "histogram"
help = "Sandbox execution latency"
labels = ["profile"]
group = "Execution"

[[metrics]]
name = "sober_sandbox_policy_violations_total"
type = "counter"
help = "Sandbox policy violations (denied network requests, etc.)"
labels = ["profile", "violation"]
group = "Security"
