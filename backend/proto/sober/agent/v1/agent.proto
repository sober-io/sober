syntax = "proto3";

package sober.agent.v1;

service AgentService {
  // Handle a user message. Returns immediately with an ack; the agent loop
  // publishes events to the broadcast channel consumed via SubscribeConversationUpdates.
  rpc HandleMessage(HandleMessageRequest) returns (HandleMessageResponse);
  rpc ExecuteTask(ExecuteTaskRequest) returns (stream AgentEvent);
  rpc WakeAgent(WakeRequest) returns (WakeResponse);
  rpc Health(HealthRequest) returns (HealthResponse);
  // Route a user's confirmation response to the agent's ConfirmationBroker.
  rpc SubmitConfirmation(ConfirmResponse) returns (ConfirmAck);
  // Update the shell tool's permission mode at runtime.
  rpc SetPermissionMode(SetPermissionModeRequest) returns (SetPermissionModeResponse);
  // Subscribe to real-time conversation events from all conversations.
  rpc SubscribeConversationUpdates(SubscribeRequest) returns (stream ConversationUpdate);
  rpc ListSkills(ListSkillsRequest) returns (ListSkillsResponse);
  rpc ReloadSkills(ReloadSkillsRequest) returns (ReloadSkillsResponse);
  // Plugin management RPCs.
  rpc ListPlugins(ListPluginsRequest) returns (ListPluginsResponse);
  rpc InstallPlugin(InstallPluginRequest) returns (InstallPluginResponse);
  rpc UninstallPlugin(UninstallPluginRequest) returns (UninstallPluginResponse);
  rpc EnablePlugin(EnablePluginRequest) returns (EnablePluginResponse);
  rpc DisablePlugin(DisablePluginRequest) returns (DisablePluginResponse);
  rpc ImportPlugins(ImportPluginsRequest) returns (ImportPluginsResponse);
  rpc ReloadPlugins(ReloadPluginsRequest) returns (ReloadPluginsResponse);
  rpc ChangePluginScope(ChangePluginScopeRequest) returns (ChangePluginScopeResponse);
  // List all available tools (built-in + plugin-exported) for the settings UI.
  rpc ListTools(ListToolsRequest) returns (ListToolsResponse);
  // Execute an approved evolution event immediately.
  rpc ExecuteEvolution(ExecuteEvolutionRequest) returns (ExecuteEvolutionResponse);
  // Revert an active evolution event.
  rpc RevertEvolution(RevertEvolutionRequest) returns (RevertEvolutionResponse);
}

message ConfirmAck {}

message ContentBlock {
  oneof block {
    TextBlock text = 1;
    ImageBlock image = 2;
    FileBlock file = 3;
    AudioBlock audio = 4;
    VideoBlock video = 5;
  }
}

message TextBlock { string text = 1; }
message ImageBlock { string conversation_attachment_id = 1; optional string alt = 2; }
message FileBlock { string conversation_attachment_id = 1; }
message AudioBlock { string conversation_attachment_id = 1; }
message VideoBlock { string conversation_attachment_id = 1; }

message HandleMessageRequest {
  string user_id = 1;
  string conversation_id = 2;
  repeated ContentBlock content = 3;
}

// Returned immediately by HandleMessage after storing the user message.
message HandleMessageResponse {
  string message_id = 1;
}

message ExecuteTaskRequest {
  string task_id = 1;
  string task_type = 2;
  bytes payload = 3;
  string caller_identity = 4;
  optional string user_id = 5;
  optional string conversation_id = 6;
  optional string workspace_id = 7;
}

message WakeRequest {
  string reason = 1;            // e.g. "job_result", "system_event"
  string caller_identity = 2;   // "scheduler"
  optional string target_id = 3;  // generic UUID ref (job_id, user_id, etc.)
  optional bytes payload = 4;     // structured result data (JSON-encoded)
}

message WakeResponse {
  bool accepted = 1;
}

message HealthRequest {}

message HealthResponse {
  bool healthy = 1;
  string version = 2;
}

message AgentEvent {
  oneof event {
    TextDelta text_delta = 1;
    ToolExecutionUpdate tool_execution_update = 2;
    Done done = 4;
    Error error = 5;
    ThinkingDelta thinking_delta = 6;
    TitleGenerated title_generated = 7;
    ConfirmRequest confirm_request = 8;
  }
}

message TextDelta { string content = 1; }
message ToolExecutionUpdate {
  string id = 1;                    // tool execution UUID
  string message_id = 2;            // assistant message UUID
  string tool_call_id = 3;          // LLM-assigned tool call ID
  string tool_name = 4;
  string status = 5;                // pending, running, completed, failed, cancelled
  optional string output = 6;
  optional string error = 7;
  optional string input = 8;        // JSON-encoded tool arguments
}
message Done { string message_id = 1; uint32 prompt_tokens = 2; uint32 completion_tokens = 3; string artifact_ref = 4; }
message Error { string message = 1; }
message ThinkingDelta { string content = 1; }
message TitleGenerated { string title = 1; }

// Shell command confirmation request sent to the user.
message ConfirmRequest {
  string confirm_id = 1;
  string command = 2;
  string risk_level = 3;
  repeated string affects = 4;
  string reason = 5;
}

// User's response to a confirmation request.
message ConfirmResponse {
  string confirm_id = 1;
  bool approved = 2;
}

// Request to change the shell tool's permission mode.
message SetPermissionModeRequest {
  // "interactive", "policy_based", or "autonomous"
  string mode = 1;
}

message SetPermissionModeResponse {}

// --- Conversation subscription types ---

// Empty request for subscribing to all conversation updates.
message SubscribeRequest {}

// A new message stored in the conversation.
message NewMessage {
  string message_id = 1;
  string role = 2;
  repeated ContentBlock content = 3;
  // What produced this message: "human", "scheduler", "replica", "admin", "system".
  string source = 4;
  // The user who triggered the message (empty for system/scheduler).
  optional string user_id = 5;
}

// The conversation title was changed.
message TitleChanged {
  string title = 1;
}

// --- Skill listing types ---

message ListSkillsRequest {
  string user_id = 1;
  optional string conversation_id = 2;
}

message SkillInfo {
  string name = 1;
  string description = 2;
}

message ListSkillsResponse {
  repeated SkillInfo skills = 1;
}

message ReloadSkillsRequest {
  optional string conversation_id = 1;
  optional string user_id = 2;
}

message ReloadSkillsResponse {
  repeated SkillInfo skills = 1;
}

// Wraps an event with its conversation_id for routing.
message ConversationUpdate {
  string conversation_id = 1;
  oneof event {
    NewMessage new_message = 2;
    TitleChanged title_changed = 3;
    TextDelta text_delta = 4;
    ToolExecutionUpdate tool_execution_update = 5;
    ThinkingDelta thinking_delta = 7;
    ConfirmRequest confirm_request = 8;
    Done done = 9;
    Error error = 10;
  }
}

// --- Plugin management types ---

message PluginInfo {
  string id = 1;
  string name = 2;
  string kind = 3;
  string version = 4;
  string description = 5;
  string status = 6;
  string config = 7; // JSON string
  string installed_at = 8;
  string scope = 9;  // "system", "user", "workspace"
}

message ListPluginsRequest {
  optional string kind = 1;
  optional string status = 2;
  // When set, only return system/user plugins and workspace plugins belonging to this workspace.
  optional string workspace_id = 3;
}

message ListPluginsResponse {
  repeated PluginInfo plugins = 1;
}

message InstallPluginRequest {
  string name = 1;
  string kind = 2;
  string config = 3; // JSON string
  optional string description = 4;
  optional string version = 5;
}

message InstallPluginResponse {
  PluginInfo plugin = 1;
}

message UninstallPluginRequest {
  string plugin_id = 1;
}

message UninstallPluginResponse {}

message EnablePluginRequest {
  string plugin_id = 1;
}

message EnablePluginResponse {}

message DisablePluginRequest {
  string plugin_id = 1;
}

message DisablePluginResponse {}

message ImportPluginsRequest {
  string mcp_servers_json = 1; // JSON string of mcpServers config
}

message ImportPluginsResponse {
  uint32 imported_count = 1;
  repeated PluginInfo plugins = 2;
}

message ReloadPluginsRequest {}

message ReloadPluginsResponse {
  uint32 active_count = 1;
}

message ChangePluginScopeRequest {
  string plugin_id = 1;
  string new_scope = 2;  // "system", "user", "workspace"
  // Required when moving TO workspace scope — identifies the target workspace.
  optional string workspace_id = 3;
}

message ChangePluginScopeResponse {
  PluginInfo plugin = 1;
}

message ListToolsRequest {
  string user_id = 1;
  optional string workspace_id = 2;
}

message ToolInfoEntry {
  string name = 1;
  string description = 2;
  string source = 3;           // "builtin" or "plugin"
  optional string plugin_id = 4;
  optional string plugin_name = 5;
}

message ListToolsResponse {
  repeated ToolInfoEntry tools = 1;
}

// --- Evolution RPCs ---

message ExecuteEvolutionRequest {
  string evolution_event_id = 1;
}

message ExecuteEvolutionResponse {
  bool success = 1;
  string error = 2;
}

message RevertEvolutionRequest {
  string evolution_event_id = 1;
}

message RevertEvolutionResponse {
  bool success = 1;
  string error = 2;
}
