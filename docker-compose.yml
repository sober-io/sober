name: sober

x-common-env: &common-env
  SOBER_ENV: development
  DATABASE_URL: postgres://sober:sober@postgres:5432/sober
  DATABASE_MAX_CONNECTIONS: "10"
  QDRANT_URL: http://qdrant:6334
  RUST_LOG: info

x-llm-env: &llm-env
  LLM_BASE_URL: ${LLM_BASE_URL:-https://openrouter.ai/api/v1}
  LLM_API_KEY: ${LLM_API_KEY:-}
  LLM_MODEL: ${LLM_MODEL:-anthropic/claude-sonnet-4}
  LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-4096}
  EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
  EMBEDDING_DIM: ${EMBEDDING_DIM:-1536}

x-memory-env: &memory-env
  MEMORY_DECAY_HALF_LIFE_DAYS: "30"
  MEMORY_RETRIEVAL_BOOST: "0.2"
  MEMORY_PRUNE_THRESHOLD: "0.1"

x-mcp-env: &mcp-env
  MCP_REQUEST_TIMEOUT_SECS: "30"
  MCP_MAX_CONSECUTIVE_FAILURES: "3"
  MCP_IDLE_TIMEOUT_SECS: "300"

services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sober
      POSTGRES_PASSWORD: sober
      POSTGRES_DB: sober
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sober"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 5s
      retries: 5

  searxng:
    image: searxng/searxng
    ports:
      - "8080:8080"
    volumes:
      - ./infra/searxng/settings.yml:/etc/searxng/settings.yml:ro

  # ---------------------------------------------------------------------------
  # Database migrations (run-once init container)
  # ---------------------------------------------------------------------------
  migrate:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.cli
    entrypoint: ["sober", "migrate", "run"]
    environment:
      DATABASE_URL: postgres://sober:sober@postgres:5432/sober
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Application services
  # ---------------------------------------------------------------------------
  sober-agent:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.agent
    environment:
      <<: [*common-env, *llm-env, *memory-env, *mcp-env]
      AGENT_SOCKET_PATH: /run/sober/agent.sock
      ADMIN_SOCKET_PATH: /run/sober/agent-admin.sock
      SEARXNG_URL: http://searxng:8080
    volumes:
      - sober_sockets:/run/sober
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "test -S /run/sober/agent.sock"]
      interval: 5s
      timeout: 5s
      retries: 10

  sober-api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - "3000:3000"
    environment:
      <<: [*common-env, *llm-env, *memory-env, *mcp-env]
      HOST: "0.0.0.0"
      PORT: "3000"
      ADMIN_SOCKET_PATH: /run/sober/api-admin.sock
      SESSION_SECRET: docker-dev-secret
      SESSION_TTL_SECONDS: "2592000"
      SEARXNG_URL: http://searxng:8080
    volumes:
      - sober_sockets:/run/sober
    depends_on:
      sober-agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  sober-scheduler:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.scheduler
    environment:
      <<: *common-env
      SCHEDULER_TICK_INTERVAL_SECS: "60"
      SCHEDULER_AGENT_SOCKET_PATH: /run/sober/agent.sock
      SCHEDULER_ADMIN_SOCKET_PATH: /run/sober/scheduler-admin.sock
      SCHEDULER_MAX_CONCURRENT_JOBS: "10"
    volumes:
      - sober_sockets:/run/sober
    depends_on:
      sober-agent:
        condition: service_healthy

  sober-web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    ports:
      - "8088:8080"
    environment:
      HOST: "0.0.0.0"
      PORT: "8080"
      API_UPSTREAM_URL: http://sober-api:3000
      STATIC_DIR: /opt/sober/data/static
      RUST_LOG: sober_web=info
    depends_on:
      sober-api:
        condition: service_healthy

volumes:
  pgdata:
  qdrant_data:
  sober_sockets:
