services:
  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sober
      POSTGRES_PASSWORD: sober
      POSTGRES_DB: sober
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sober"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  searxng:
    image: searxng/searxng
    ports:
      - "8080:8080"
    volumes:
      - searxng_data:/etc/searxng

volumes:
  pgdata:
  qdrant_data:
  searxng_data:
