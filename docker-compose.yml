name: sober

x-common-env: &common-env
  SOBER_ENV: development
  SOBER_DATABASE_URL: postgres://sober:sober@postgres:5432/sober
  SOBER_DATABASE_MAX_CONNECTIONS: "10"
  SOBER_QDRANT_URL: http://qdrant:6334
  RUST_LOG: info,tower_http=debug

x-llm-env: &llm-env
  SOBER_LLM_BASE_URL: ${LLM_BASE_URL:-https://openrouter.ai/api/v1}
  SOBER_LLM_API_KEY: ${LLM_API_KEY:-}
  SOBER_LLM_MODEL: ${LLM_MODEL:-anthropic/claude-sonnet-4}
  SOBER_LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-4096}
  SOBER_LLM_EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
  SOBER_LLM_EMBEDDING_DIM: ${EMBEDDING_DIM:-1536}
  SOBER_LLM_VISION: ${LLM_VISION:-true}

x-memory-env: &memory-env
  SOBER_MEMORY_DECAY_HALF_LIFE_DAYS: "30"
  SOBER_MEMORY_RETRIEVAL_BOOST: "0.2"
  SOBER_MEMORY_PRUNE_THRESHOLD: "0.1"

x-mcp-env: &mcp-env
  SOBER_MCP_REQUEST_TIMEOUT_SECS: "30"
  SOBER_MCP_MAX_CONSECUTIVE_FAILURES: "3"
  SOBER_MCP_IDLE_TIMEOUT_SECS: "300"

x-crypto-env: &crypto-env
  SOBER_CRYPTO_MASTER_ENCRYPTION_KEY: ${MASTER_ENCRYPTION_KEY:-}

x-otel-env: &otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317

services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sober
      POSTGRES_PASSWORD: sober
      POSTGRES_DB: sober
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sober"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 5s
      retries: 5

  searxng:
    image: searxng/searxng
    ports:
      - "8080:8080"
    volumes:
      - ./infra/searxng/settings.yml:/etc/searxng/settings.yml:ro

  # ---------------------------------------------------------------------------
  # Observability
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alerts/:/etc/prometheus/alerts/:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-remote-write-receiver

  tempo:
    image: grafana/tempo:2.7.2
    ports:
      - "4317:4317"
      - "3200:3200"
    volumes:
      - ./infra/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    command:
      - -config.file=/etc/tempo/tempo.yml

  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    volumes:
      - ./infra/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./infra/grafana/provisioning/:/etc/grafana/provisioning/:ro
      - ./infra/grafana/dashboards/:/var/lib/grafana/dashboards/:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - tempo

  # ---------------------------------------------------------------------------
  # Database migrations (run-once init container)
  # ---------------------------------------------------------------------------
  migrate:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.cli
    entrypoint: ["sober", "migrate", "run"]
    environment:
      SOBER_DATABASE_URL: postgres://sober:sober@postgres:5432/sober
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Application services
  # ---------------------------------------------------------------------------
  sober-agent:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.agent
    privileged: true
    ports:
      - "9100:9100"
    environment:
      <<: [*common-env, *llm-env, *memory-env, *mcp-env, *crypto-env, *otel-env]
      SOBER_AGENT_SOCKET_PATH: /run/sober/agent.sock
      SOBER_AGENT_SANDBOX_PROFILE: unrestricted
      SOBER_AGENT_METRICS_PORT: "9100"
      SOBER_WORKSPACE_ROOT: /var/lib/sober/workspaces
      SOBER_ADMIN_SOCKET_PATH: /run/sober/agent-admin.sock
      SOBER_SEARXNG_URL: http://searxng:8080
      OTEL_SERVICE_NAME: sober-agent
    volumes:
      - sober_sockets:/run/sober
      - sober_workspaces:/var/lib/sober/workspaces
      - ${HOME}/.sober:/home/sober/.sober:ro
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "test -S /run/sober/agent.sock"]
      interval: 5s
      timeout: 5s
      retries: 10

  sober-api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - "3000:3000"
    environment:
      <<: [*common-env, *llm-env, *memory-env, *mcp-env, *otel-env]
      SOBER_SERVER_HOST: "0.0.0.0"
      SOBER_SERVER_PORT: "3000"
      SOBER_ADMIN_SOCKET_PATH: /run/sober/api-admin.sock
      SOBER_AUTH_SESSION_SECRET: docker-dev-secret
      SOBER_AUTH_SESSION_TTL_SECONDS: "2592000"
      SOBER_SEARXNG_URL: http://searxng:8080
      OTEL_SERVICE_NAME: sober-api
      SOBER_WORKSPACE_ROOT: /var/lib/sober/workspaces
    volumes:
      - sober_sockets:/run/sober
      - sober_workspaces:/var/lib/sober/workspaces
    depends_on:
      sober-agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  sober-scheduler:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.scheduler
    ports:
      - "9101:9101"
    environment:
      <<: [*common-env, *otel-env]
      SOBER_SCHEDULER_TICK_INTERVAL_SECS: "1"
      SOBER_SCHEDULER_AGENT_SOCKET_PATH: /run/sober/agent.sock
      SOBER_SCHEDULER_SOCKET_PATH: /run/sober/scheduler.sock
      SOBER_SCHEDULER_MAX_CONCURRENT_JOBS: "10"
      SOBER_SCHEDULER_METRICS_PORT: "9101"
      SOBER_WORKSPACE_ROOT: /var/lib/sober/workspaces
      SOBER_SCHEDULER_SANDBOX_PROFILE: unrestricted
      OTEL_SERVICE_NAME: sober-scheduler
    volumes:
      - sober_sockets:/run/sober
    depends_on:
      sober-agent:
        condition: service_healthy

  sober-gateway:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.gateway
    ports:
      - "9102:9102"
    environment:
      <<: [*common-env, *crypto-env, *otel-env]
      SOBER_GATEWAY_SOCKET_PATH: /run/sober/gateway.sock
      SOBER_GATEWAY_AGENT_SOCKET_PATH: /run/sober/agent.sock
      SOBER_GATEWAY_METRICS_PORT: "9102"
      OTEL_SERVICE_NAME: sober-gateway
    volumes:
      - sober_sockets:/run/sober
    depends_on:
      sober-agent:
        condition: service_healthy

  sober-cli:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.cli
    entrypoint: ["sleep", "infinity"]
    environment:
      <<: *common-env
    volumes:
      - sober_sockets:/run/sober
    depends_on:
      postgres:
        condition: service_healthy

  sober-web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    ports:
      - "8088:8080"
    environment:
      <<: *otel-env
      SOBER_WEB_HOST: "0.0.0.0"
      SOBER_WEB_PORT: "8080"
      SOBER_WEB_API_UPSTREAM_URL: http://sober-api:3000
      SOBER_WEB_STATIC_DIR: /opt/sober/data/static
      RUST_LOG: sober_web=info
      OTEL_SERVICE_NAME: sober-web
    depends_on:
      sober-api:
        condition: service_healthy

volumes:
  pgdata:
  qdrant_data:
  sober_sockets:
  sober_workspaces:
  prometheus_data:
  tempo_data:
  grafana_data:
