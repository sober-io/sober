name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  tag:
    name: Determine version and tag
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
      skip: ${{ steps.bump.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: bump
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Get latest tag or default to v0.0.0
          LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "Latest tag: $LATEST_TAG"

          # Parse current version
          VERSION="${LATEST_TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          # Skip release for docs: and ci: prefixed PRs
          if echo "$PR_TITLE" | grep -qiE '^(docs|ci)(\(.+\))?:'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping release for docs/ci change"
            exit 0
          fi

          # Determine bump type from PR title (conventional commit format)
          if echo "$PR_TITLE" | grep -qiE '(BREAKING[ -]CHANGE|^[a-z]+(\(.+\))?!:)'; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif echo "$PR_TITLE" | grep -qiE '^feat(\(.+\))?:'; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "New tag: $NEW_TAG"

      - name: Create and push tag
        if: steps.bump.outputs.skip != 'true'
        env:
          NEW_TAG: ${{ steps.bump.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
          git push origin "$NEW_TAG"

  build:
    name: Build (${{ matrix.target }})
    needs: tag
    if: needs.tag.outputs.skip != 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            sudo apt-get install -y protobuf-compiler
          else
            brew install protobuf
          fi

      - uses: dtolnay/rust-toolchain@stable
        if: ${{ !matrix.cross }}
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install cross
        if: ${{ matrix.cross }}
        run: cargo install cross --quiet

      - name: Build binaries
        working-directory: backend
        env:
          BUILD_TARGET: ${{ matrix.target }}
          USE_CROSS: ${{ matrix.cross }}
        run: |
          if [ "$USE_CROSS" = "true" ]; then
            cross build --release --target "$BUILD_TARGET"
          else
            cargo build --release --target "$BUILD_TARGET"
          fi

      - name: Package release archive
        env:
          BUILD_TARGET: ${{ matrix.target }}
          TAG: ${{ needs.tag.outputs.tag }}
        run: |
          STAGING="staging"

          mkdir -p "$STAGING/bin" "$STAGING/systemd" "$STAGING/config"

          for bin in sober soberctl sober-api sober-agent sober-scheduler sober-web; do
            cp "backend/target/$BUILD_TARGET/release/$bin" "$STAGING/bin/" 2>/dev/null || true
          done

          cp infra/systemd/* "$STAGING/systemd/"
          cp infra/config/* "$STAGING/config/"

          ARCHIVE="sober-${TAG}-${BUILD_TARGET}.tar.gz"
          tar -czf "$ARCHIVE" -C "$STAGING" .
          sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            sober-*.tar.gz
            sober-*.tar.gz.sha256

  release:
    name: Create Release
    needs: [tag, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          body: ${{ steps.changelog.outputs.content }}
          files: artifacts/*
