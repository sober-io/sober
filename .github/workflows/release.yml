name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            sudo apt-get install -y protobuf-compiler
          else
            brew install protobuf
          fi

      - uses: dtolnay/rust-toolchain@stable
        if: ${{ !matrix.cross }}
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install cross
        if: ${{ matrix.cross }}
        run: cargo install cross --quiet

      - name: Build binaries
        working-directory: backend
        env:
          BUILD_TARGET: ${{ matrix.target }}
          USE_CROSS: ${{ matrix.cross }}
        run: |
          if [ "$USE_CROSS" = "true" ]; then
            cross build --release --target "$BUILD_TARGET"
          else
            cargo build --release --target "$BUILD_TARGET"
          fi

      - name: Package release archive
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          STAGING="staging"

          mkdir -p "$STAGING/bin" "$STAGING/systemd" "$STAGING/config"

          for bin in sober soberctl sober-api sober-agent sober-scheduler sober-web; do
            cp "backend/target/$BUILD_TARGET/release/$bin" "$STAGING/bin/" 2>/dev/null || true
          done

          cp infra/systemd/* "$STAGING/systemd/"
          cp infra/config/* "$STAGING/config/"

          ARCHIVE="sober-${TAG}-${BUILD_TARGET}.tar.gz"
          tar -czf "$ARCHIVE" -C "$STAGING" .
          sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sober-*.tar.gz
            sober-*.tar.gz.sha256
