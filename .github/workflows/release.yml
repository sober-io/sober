name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.12)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tag:
    name: Determine version and tag
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
      skip: ${{ steps.bump.outputs.skip }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: bump
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          MANUAL_TAG: ${{ inputs.tag }}
        run: |
          # Manual dispatch: use the provided tag directly
          if [ -n "$MANUAL_TAG" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "tag=$MANUAL_TAG" >> "$GITHUB_OUTPUT"
            echo "Manual release: $MANUAL_TAG"
            exit 0
          fi

          # Get latest tag or default to v0.0.0
          LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "Latest tag: $LATEST_TAG"

          # Parse current version
          VERSION="${LATEST_TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          # Skip release for docs-only and CI-only PRs
          if echo "$PR_TITLE" | grep -qiE '^(docs|ci)(\(.+\))?:'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping release for docs/ci change"
            exit 0
          fi

          # Determine bump type from branch prefix (primary) or PR title (fallback).
          # feat/ branches always bump MINOR. fix/, chore/, refactor/, sec/ bump PATCH.
          # Breaking changes (in title) always bump MAJOR.
          echo "Branch: $PR_BRANCH"
          echo "Title:  $PR_TITLE"

          if echo "$PR_TITLE" | grep -qiE '(BREAKING[ -]CHANGE|^[a-z]+(\(.+\))?!:)'; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            echo "Bump: MAJOR (breaking change)"
          elif echo "$PR_BRANCH" | grep -qE '^feat/'; then
            MINOR=$((MINOR + 1))
            PATCH=0
            echo "Bump: MINOR (feat/ branch)"
          elif echo "$PR_TITLE" | grep -qiE '^feat(\(.+\))?:'; then
            MINOR=$((MINOR + 1))
            PATCH=0
            echo "Bump: MINOR (feat in title)"
          else
            PATCH=$((PATCH + 1))
            echo "Bump: PATCH (fix/chore/refactor/sec)"
          fi

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "New tag: $NEW_TAG"

      - name: Create and push tag
        if: steps.bump.outputs.skip != 'true'
        env:
          NEW_TAG: ${{ steps.bump.outputs.tag }}
        run: |
          # Skip if tag already exists (manual dispatch with existing tag)
          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "Tag $NEW_TAG already exists, skipping creation"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
          git push origin "$NEW_TAG"

  build:
    name: Build (${{ matrix.target }})
    needs: tag
    if: needs.tag.outputs.skip != 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            cross: false

    steps:
      - uses: actions/checkout@v5

      - name: Install protoc
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            sudo apt-get install -y protobuf-compiler
          else
            brew install protobuf
          fi

      - uses: dtolnay/rust-toolchain@stable
        if: ${{ !matrix.cross }}
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install cross
        if: ${{ matrix.cross }}
        run: cargo install cross --quiet

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build frontend
        working-directory: frontend
        run: pnpm install --frozen-lockfile && pnpm build

      - name: Build binaries
        env:
          BUILD_TARGET: ${{ matrix.target }}
          USE_CROSS: ${{ matrix.cross }}
        run: |
          if [ "$USE_CROSS" = "true" ]; then
            # Run from repo root so cross mounts frontend/build/ into the container
            cross build --release --target "$BUILD_TARGET" --manifest-path backend/Cargo.toml
          else
            cd backend && cargo build --release --target "$BUILD_TARGET"
          fi

      - name: Package release archive
        env:
          BUILD_TARGET: ${{ matrix.target }}
          TAG: ${{ needs.tag.outputs.tag }}
        run: |
          STAGING="staging"

          mkdir -p "$STAGING/bin" "$STAGING/systemd" "$STAGING/config"

          for bin in sober sober-api sober-agent sober-scheduler sober-web; do
            cp "backend/target/$BUILD_TARGET/release/$bin" "$STAGING/bin/" 2>/dev/null || true
          done

          cp infra/systemd/* "$STAGING/systemd/"
          cp infra/config/* "$STAGING/config/"

          ARCHIVE="sober-${TAG}-${BUILD_TARGET}.tar.gz"
          tar -czf "$ARCHIVE" -C "$STAGING" .
          sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: release-${{ matrix.target }}
          path: |
            sober-*.tar.gz
            sober-*.tar.gz.sha256

  release:
    name: Create Release
    needs: [tag, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header

      - name: Download all build artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: release-*
          merge-multiple: true
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          body: |
            ${{ steps.changelog.outputs.content }}

            ---

            ### Docker Images

            Docker images for this release are published to GHCR and will be available shortly after the release:

            ```bash
            docker pull ghcr.io/sober-io/sober/sober-web:${{ needs.tag.outputs.tag }}
            docker pull ghcr.io/sober-io/sober/sober-api:${{ needs.tag.outputs.tag }}
            docker pull ghcr.io/sober-io/sober/sober-agent:${{ needs.tag.outputs.tag }}
            docker pull ghcr.io/sober-io/sober/sober-scheduler:${{ needs.tag.outputs.tag }}
            ```

            Or use `docker-compose.prod.yml` for a full deployment:

            ```bash
            SOBER_VERSION=${{ needs.tag.outputs.tag }} docker compose -f docker-compose.prod.yml up -d
            ```
          files: artifacts/*
