name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/book/**'
      - 'README.md'
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - name: Install mdBook and mdbook-mermaid
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL https://github.com/rust-lang/mdBook/releases/latest/download/mdbook-v0.5.2-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C "$HOME/.local/bin"
          curl -fsSL https://github.com/badboy/mdbook-mermaid/releases/latest/download/mdbook-mermaid-v0.17.0-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build documentation
        working-directory: docs/book
        run: |
          mdbook-mermaid install
          mdbook build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/book/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
