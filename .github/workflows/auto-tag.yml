name: Auto Tag

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    name: Determine version and tag
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: bump
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Get latest tag or default to v0.0.0
          LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "Latest tag: $LATEST_TAG"

          # Parse current version
          VERSION="${LATEST_TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          # Determine bump type from PR title (conventional commit format)
          # Skip release for docs: and ci: prefixed PRs
          if echo "$PR_TITLE" | grep -qiE '^(docs|ci)(\(.+\))?:'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping release for docs/ci change"
            exit 0
          fi

          if echo "$PR_TITLE" | grep -qiE '(BREAKING[ -]CHANGE|^[a-z]+(\(.+\))?!:)'; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif echo "$PR_TITLE" | grep -qiE '^feat(\(.+\))?:'; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "New tag: $NEW_TAG"

      - name: Create and push tag
        if: steps.bump.outputs.skip != 'true'
        env:
          NEW_TAG: ${{ steps.bump.outputs.tag }}
        run: |
          git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
          git push origin "$NEW_TAG"
