name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust-check:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Create frontend build stub for rust-embed
        run: mkdir -p frontend/build && touch frontend/build/index.html

      - name: Check formatting
        run: cargo fmt --check
        working-directory: backend

      - name: Clippy
        run: cargo clippy -- -D warnings
        working-directory: backend

      - name: Test
        run: cargo test --workspace --exclude sober-db --exclude sober-api
        working-directory: backend

      - name: Test sober-api (unit tests only, integration tests require DATABASE_URL)
        run: cargo test -p sober-api --lib --bins
        working-directory: backend

      - name: Test sober-db (unit tests only, integration tests require DATABASE_URL)
        run: cargo test -p sober-db --lib
        working-directory: backend

      # TODO: re-enable cargo-audit step once CI times are acceptable

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: sober
          POSTGRES_PASSWORD: sober
          POSTGRES_DB: sober
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sober"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      qdrant:
        image: qdrant/qdrant
        ports:
          - 6333:6333
          - 6334:6334
    env:
      DATABASE_URL: postgres://sober:sober@localhost:5432/sober
      QDRANT_URL: http://localhost:6334
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-integration-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-integration-

      - name: Create frontend build stub for rust-embed
        run: mkdir -p frontend/build && touch frontend/build/index.html

      - name: Wait for Qdrant
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:6333/readyz > /dev/null 2>&1 && exit 0
            sleep 2
          done
          echo "Qdrant failed to become ready" >&2
          exit 1

      - name: Test sober-db (full integration)
        run: cargo test -p sober-db
        working-directory: backend

      - name: Test sober-api (integration tests)
        run: cargo test -p sober-api
        working-directory: backend

      - name: Test sober-memory (ignored integration tests)
        run: cargo test -p sober-memory -- --ignored
        working-directory: backend

  frontend-check:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install
        working-directory: frontend

      - name: Check
        run: pnpm check
        working-directory: frontend

      - name: Lint
        run: pnpm lint
        working-directory: frontend
